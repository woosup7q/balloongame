let ac = null;
let masterVol = parseFloat(localStorage.getItem('balloonVol')||'1'); // 0~1 사이 소리 크기
function initAudio() { if (!ac) ac = new (window.AudioContext||window.webkitAudioContext)(); }
function playTone(freq, dur, vol=0.18, type='square') {
  vol = vol * masterVol; // 마스터 볼륨 적용!
  if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
  o.start(); o.stop(ac.currentTime + dur);
}
function playPop() {
  if (!ac) return;
  const n = Math.floor(ac.sampleRate * 0.09);
  const buf = ac.createBuffer(1, n, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0; i<n; i++) d[i] = (Math.random()*2-1)*(1-i/n)*0.45*masterVol;
  const s = ac.createBufferSource(); s.buffer = buf;
  s.connect(ac.destination); s.start();
}
function playShoot() {
  if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination); o.type = 'sine';
  o.frequency.setValueAtTime(700, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(80, ac.currentTime+0.08);
  g.gain.setValueAtTime(0.25*masterVol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+0.08);
  o.start(); o.stop(ac.currentTime+0.08);
}

function loadHS() { try { return JSON.parse(localStorage.getItem('balloonHS')||'{"level":1,"world":1,"score":0}'); } catch { return {level:1,world:1,score:0}; } }
function saveHS(lv,wo,sc) {

// ===== GAME OBJECTS =====
class Balloon {
  constructor(lkLv, spdMult) {
    const b = pickBalloon(lkLv);
    this.color=b.color; this.pts=b.pts; this.spd=b.spd*spdMult;
    this.pat=b.pat; this.r=30;
    this.x=50+Math.random()*(W-100); this.y=H+31; this.t=0;
  }
  update(slow) {
    this.t+=0.05; const s=this.spd*slow;
    if (this.pat==='straight') { this.y-=s; }
    else if (this.pat==='zigzag') { this.y-=s; this.x+=3*(Math.floor(this.t*10)%2?-1:1); }
    else { this.y-=s*0.5; this.x+=3*Math.cos(this.t*Math.PI*100/180); }
    this.x=Math.max(this.r,Math.min(W-this.r,this.x));
  }
  draw() {
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=this.color; ctx.fill();
    ctx.beginPath(); ctx.arc(this.x-8,this.y-8,7,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(this.x,this.y+this.r); ctx.lineTo(this.x,this.y+this.r+15);
    ctx.strokeStyle='#333'; ctx.lineWidth=2; ctx.stroke();
  }
  offScreen() { return this.y < -this.r; }
}

class Boss {
  constructor(wo, final) {
    this.fin=final; this.wo=wo;
    this.name=final?`World ${wo} BOSS`:`World ${wo} Mid-Boss`;
    this.color=final?'#FF2222':'#FF8800'; this.r=final?65:50;
    this.x=W/2; this.y=final?160:130;
    this.pts=(final?200:100)*wo;
    this.maxHp=Math.max(1,Math.round((final?10:5)*wo*DS.bossHpMult)); this.hp=this.maxHp;
    this.t=0; this.flash=0;
  }
  update() {
    this.t+=0.02;
    if (this.fin){this.x=W/2+Math.sin(this.t)*180*Math.cos(this.t/2);this.y=160+Math.cos(this.t*1.5)*60;}
    else {this.x=W/2+Math.sin(this.t*1.2)*250;this.y=120+Math.sin(this.t*.4)*40;}
    if(this.flash>0)this.flash--;
  }
  hit(){this.hp--;this.flash=8;playBossHit();}
  dead(){return this.hp<=0;}
  draw(){
    const col=this.flash>0?'#FFF':this.color;
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=col;ctx.fill();ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.stroke();
    ctx.beginPath();ctx.arc(this.x-18,this.y-18,16,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fill();
    ctx.beginPath();ctx.moveTo(this.x,this.y+this.r);ctx.lineTo(this.x,this.y+this.r+20);
    ctx.strokeStyle='#333';ctx.lineWidth=3;ctx.stroke();
    ctx.fillStyle='#FFF';ctx.font='bold 14px Arial';ctx.textAlign='center';
    ctx.fillText(this.name,this.x,this.y-4);
    const bw=120,bx=this.x-bw/2,by=this.y-this.r-22;
    ctx.fillStyle='#500';ctx.fillRect(bx,by,bw,12);
    ctx.fillStyle='#F00';ctx.fillRect(bx,by,bw*this.hp/this.maxHp,12);
    ctx.strokeStyle='#000';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,12);
    ctx.fillStyle='#FFF';ctx.font='11px Arial';
    ctx.fillText(`${this.hp}/${this.maxHp}`,this.x,by-3);
  }
}

class Arrow {
  constructor(x,y,ang,piercing,expR,hom,bnc,boom){
    this.x=x;this.y=y;
    const r=ang*Math.PI/180;
    this.dx=Math.cos(r)*12;this.dy=Math.sin(r)*12;
    this.hits=0;this.piercing=piercing;this.expR=expR;
    this.hom=hom;this.bnc=bnc;this.boom=boom;this.trail=[];
  }
  update(targets){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>8)this.trail.shift();
    if(this.hom>0&&targets.length>0){
      let near=targets[0],nd=Infinity;
      for(const t of targets){const d=Math.hypot(t.x-this.x,t.y-this.y);if(d<nd){nd=d;near=t;}}
      const tgt=Math.atan2(near.y-this.y,near.x-this.x)*180/Math.PI;
      const cur=Math.atan2(this.dy,this.dx)*180/Math.PI;
      const diff=((tgt-cur+180)%360)-180;
      const turn=Math.min(Math.abs(diff),this.hom)*Math.sign(diff);
      const spd=Math.hypot(this.dx,this.dy);
      const a=(cur+turn)*Math.PI/180;
      this.dx=Math.cos(a)*spd;this.dy=Math.sin(a)*spd;
    }
    this.x+=this.dx;this.y+=this.dy;
    if((this.x<0||this.x>W)&&this.bnc>0){this.dx=-this.dx;this.x=Math.max(0,Math.min(W,this.x));this.bnc--;}
    if(this.boom>0&&this.y<0){this.dy=Math.abs(this.dy);this.boom--;}
  }
  draw(){
    for(let i=0;i<this.trail.length;i++){
      const a=i/this.trail.length;
      ctx.beginPath();ctx.arc(this.trail[i].x,this.trail[i].y,2,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,200,255,${a})`;ctx.fill();
    }
    const ex=this.x-this.dx*2,ey=this.y-this.dy*2;
    ctx.beginPath();ctx.moveTo(this.x,this.y);ctx.lineTo(ex,ey);
    ctx.strokeStyle='#333';ctx.lineWidth=4;ctx.stroke();
    ctx.beginPath();ctx.arc(this.x,this.y,5,0,Math.PI*2);
    ctx.fillStyle='#8B4513';ctx.fill();
  }
  canPierce(){return this.hits<=this.piercing;}
  offScreen(){
    if(this.boom>0)return this.y>H+30;
    return (this.y<-30||this.y>H+30)||(this.bnc<=0&&(this.x<-30||this.x>W+30));
  }
}

class Bow {
  constructor(){this.x=W/2;this.y=H-40;this.angle=-90;this.len=60;this.charging=false;this.ct=0;}
  rotate(d){this.angle=Math.max(-170,Math.min(-10,this.angle+d*3));}
  tip(){const r=this.angle*Math.PI/180;return[this.x+Math.cos(r)*this.len,this.y+Math.sin(r)*this.len];}
  draw(){
    const [tx,ty]=this.tip();
    const str=this.charging?Math.floor(this.ct*3):0;
    const r=this.angle*Math.PI/180;
    const px=-Math.sin(r),py=Math.cos(r);
    const mx=this.x+px*str,my=this.y+py*str;
    ctx.beginPath();
    ctx.moveTo(this.x-px*20,this.y-py*20);
    ctx.quadraticCurveTo((this.x+tx)/2+px*20,(this.y+ty)/2+py*20,tx,ty);
    ctx.quadraticCurveTo((tx+this.x)/2+px*20,(ty+this.y)/2+py*20,this.x+px*20,this.y+py*20);
    ctx.strokeStyle='#8B4513';ctx.lineWidth=5;ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(this.x-px*20,this.y-py*20);ctx.lineTo(mx,my);ctx.lineTo(this.x+px*20,this.y+py*20);
    ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.stroke();
    ctx.beginPath();ctx.arc(this.x,this.y,12,0,Math.PI*2);ctx.fillStyle='#8B4513';ctx.fill();
  }
}

// ===== EFFECTS =====
class PopFX{
  constructor(x,y,c){this.x=x;this.y=y;this.c=c;this.r=10;this.a=1;}
  update(){this.r+=4;this.a-=0.08;}
  draw(){if(this.a<=0)return;ctx.globalAlpha=Math.max(0,this.a);ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=this.c;ctx.fill();ctx.globalAlpha=1;}
  done(){return this.a<=0;}
}
class ExpFX{
  constructor(x,y,r){this.x=x;this.y=y;this.mr=r;this.cr=10;this.a=0.8;}
  update(){this.cr+=(this.mr-this.cr)*0.2+3;this.a-=0.07;}
  draw(){if(this.a<=0)return;ctx.beginPath();ctx.arc(this.x,this.y,this.cr,0,Math.PI*2);ctx.fillStyle=`rgba(255,150,0,${this.a})`;ctx.fill();ctx.beginPath();ctx.arc(this.x,this.y,this.cr,0,Math.PI*2);ctx.strokeStyle=`rgba(255,255,100,${this.a*.5})`;ctx.lineWidth=4;ctx.stroke();}
  done(){return this.a<=0;}
}
class LightFX{
  constructor(x1,y1,x2,y2){this.x1=x1;this.y1=y1;this.x2=x2;this.y2=y2;this.a=1;}
  update(){this.a-=0.14;}
  draw(){if(this.a<=0)return;ctx.beginPath();ctx.moveTo(this.x1,this.y1);ctx.lineTo(this.x2,this.y2);ctx.strokeStyle=`rgba(255,255,100,${this.a})`;ctx.lineWidth=3;ctx.stroke();}
  done(){return this.a<=0;}
}
class ScorePopup{
  constructor(x,y,pts,c){this.x=x;this.y=y;this.pts=pts;this.c=c;this.a=1;}
  update(){this.y-=2;this.a-=0.031;}
  draw(){if(this.a<=0)return;ctx.globalAlpha=Math.max(0,this.a);ctx.font='bold 22px Arial';ctx.fillStyle=this.c;ctx.textAlign='center';ctx.fillText(`+${this.pts}`,this.x,this.y);ctx.globalAlpha=1;}
  done(){return this.a<=0;}
}

function seededRand(seed){let s=seed;return()=>{s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function drawBG(wo){
  const th=getTheme(wo);

  g.addColorStop(0,`rgb(${th.st.join()})`);g.addColorStop(1,`rgb(${th.sb.join()})`);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H-40);
  const wi=(wo-1)%5+1;
  if(wi===3||wi===4){const r=seededRand(42);for(let i=0;i<80;i++){ctx.beginPath();ctx.arc(r()*W,r()*(H-80),1,0,Math.PI*2);ctx.fillStyle='#FFF';ctx.fill();}}
  for(const c of clouds){ctx.beginPath();ctx.ellipse(c.x,c.y,c.w/2,c.h/2,0,0,Math.PI*2);ctx.fillStyle=`rgb(${th.cl.join()})`;ctx.fill();ctx.beginPath();ctx.ellipse(c.x+15,c.y-12,(c.w-20)/2,(c.h-8)/2,0,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle=`rgb(${th.gr.join()})`;ctx.fillRect(0,H-40,W,40);
  const d=th.gr.map(v=>Math.max(0,v-30));ctx.fillStyle=`rgb(${d.join()})`;ctx.fillRect(0,H-40,W,5);
}

function rr(x,y,w,h,r,fill,stroke,sw){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}if(stroke&&sw){ctx.strokeStyle=stroke;ctx.lineWidth=sw;ctx.stroke();}
}
function inR(mx,my,r){return mx>=r.x&&mx<=r.x+r.w&&my>=r.y&&my<=r.y+r.h;}
function lighten(col,n){const m=col.match(/\d+/g);if(!m)return col;return `rgb(${m.map(v=>Math.min(255,+v+n)).join()})`;}

// ===== INPUT =====
const keysDown={};
window.addEventListener('keydown',e=>{
  if(e.code==='Space')e.preventDefault();
  keysDown[e.code]=true;
  if(e.key==='Escape'){
    if(gState==='slotSelect'){gState='menu';return;}
    if(gState==='diffSelect'){gState=gameMode==='single'?'slotSelect':'menu';return;}
    if(gState==='serverList'){gState='diffSelect';return;}
    if(gState==='waiting'){gState='serverList';if(socket)socket.emit('leaveRoom');return;}
  }
  if(e.code==='KeyP'&&gState==='playing'&&!shopOpen&&!ovData&&!helpOpen){paused=!paused;return;}
  if(gState!=='playing'||shopOpen||ovData||paused)return;
  if(e.code==='Space'){bow.charging=true;bow.ct=0;}
});
window.addEventListener('keyup',e=>{
  keysDown[e.code]=false;
  if(gState!=='playing'||shopOpen||ovData)return;
  if(e.code==='Space'){
    const cap=AC[upg.infinite||0],canShoot=cap===-1||arrowsLeft>0;
    if(bow.charging&&bow.ct>=0&&canShoot){
      const [tx,ty]=bow.tip();
      const num=MC[upg.multishot||0],pier=PC[upg.piercing||0];
      const expR=ER[upg.explosive||0],hom=HS2[upg.homing||0];
      const bnc=RB[upg.ricochet||0],boom=BR[upg.boomerang||0];
      const spread=10,startA=bow.angle-(num-1)*spread/2;
      for(let j=0;j<num;j++) arrows.push(new Arrow(tx,ty,startA+j*spread,pier,expR,hom,bnc,boom));
      if(cap!==-1)arrowsLeft=Math.max(0,arrowsLeft-1);
      playShoot();
    }
    bow.charging=false;bow.ct=0;
  }
});

function getMouse(e){
  const r=canvas.getBoundingClientRect();
  return[(e.clientX-r.left)*W/r.width,(e.clientY-r.top)*H/r.height];
}

canvas.addEventListener('mousemove',e=>{
  const[mx,my]=getMouse(e);
  if(gState==='menu'){menuHover=null;for(const b of menuBtns)if(inR(mx,my,b.rect))menuHover=b.key;if(inR(mx,my,{x:W-70,y:5,w:60,h:36}))menuHover='exit';}
});

canvas.addEventListener('click',e=>{
  initAudio();
  const[mx,my]=getMouse(e);
  // help close
  if(helpOpen){
    if(_helpCloseR&&inR(mx,my,_helpCloseR))helpOpen=false;
    return;
  }
  // exit button
  if(inR(mx,my,{x:W-70,y:5,w:60,h:36})){
    if(gState==='playing'){saveHS(level,world,totalScore);if(gameMode==='single')saveSlot();}
    gState='menu';stopBGM();startBGM(0);return;
  }
  // ? help button (circle at 130, H-31, r=15)
  if(gState==='playing'){
    const dx=mx-130,dy=my-(H-31);
    if(dx*dx+dy*dy<=225){helpOpen=true;helpScroll=0;return;}
    const dx2=mx-160,dy2=my-(H-31);
    if(dx2*dx2+dy2*dy2<=225){paused=!paused;optionsOpen=false;return;}
  }
  // 옵션 창 열려있을 때
  if(optionsOpen){
    const sl=OPT_SLIDER;
    if(my>=sl.y-10&&my<=sl.y+sl.h+10&&mx>=sl.x&&mx<=sl.x+sl.w){
      masterVol=Math.max(0,Math.min(1,(mx-sl.x)/sl.w));
      localStorage.setItem('balloonVol',masterVol);return;
    }
    const py2=160,ph2=280;
    const cb2={x:W/2-80,y:py2+ph2-65,w:160,h:44};
    if(inR(mx,my,cb2)){optionsOpen=false;return;}
    return;
  }
  // 일시정지 중 OPTIONS 버튼
  if(paused&&!optionsOpen){
    const ob={x:W/2-80,y:325,w:160,h:48};
    if(inR(mx,my,ob)){optionsOpen=true;return;}
    paused=false;return;  // 패널 밖 클릭 → 재개
  }
  // ① 모드 선택
  if(gState==='menu'){
    for(const b of menuBtns){
      if(inR(mx,my,b.rect)){
        gameMode=b.key;
        gState=b.key==='single'?'slotSelect':'diffSelect';  // 싱글은 슬롯 선택 먼저!
        return;
      }
    }
    return;
  }
  // ② 난이도 선택
  if(gState==='diffSelect'){
    if(diffBackBtn&&inR(mx,my,diffBackBtn)){gState='menu';return;}
    for(const b of diffBtns){
      if(inR(mx,my,b.rect)){
        DS=DIFF[b.key];
        if(gameMode==='single'){resetGame(b.key);return;}  // 빈 슬롯 선택 후 난이도 골랐으니 바로 게임!
        else{connectSocket();serverMsg='';socket.emit('getRooms');gState='serverList';return;}
      }
    }
    return;
  }
  // ③ 슬롯 선택 (싱글)
  if(gState==='slotSelect'){
    if(slotBackBtn&&inR(mx,my,slotBackBtn)){gState='menu';return;}
    for(const b of slotDelBtns){if(inR(mx,my,b.rect)){deleteSlot(b.idx);return;}}
    for(const b of slotBtns){
      if(inR(mx,my,b.rect)){
        if(b.filled){continueSlot(b.idx);return;}
        else{currentSlot=b.idx;gState='diffSelect';return;}  // 빈 슬롯 → 난이도 고르기
      }
    }
    return;
  }
  // ③ 서버 목록
  if(gState==='serverList'){
    if(serverBackBtn&&inR(mx,my,serverBackBtn)){gState='diffSelect';return;}
    if(serverRefreshBtn&&inR(mx,my,serverRefreshBtn)){socket.emit('getRooms');serverMsg='';return;}
    if(serverCreateBtn&&inR(mx,my,serverCreateBtn)){
      const dk=Object.keys(DIFF).find(k=>DIFF[k]===DS)||'normal';
      socket.emit('createRoom',{diff:dk,name:`${DS.label} 방`});
      return;
    }
    for(const b of serverBtns){
      if(inR(mx,my,b.rect)){socket.emit('joinRoom',b.code);return;}
    }
    return;
  }
  // ④ 대기 화면
  if(gState==='waiting'){
    if(_waitBackBtn&&inR(mx,my,_waitBackBtn)){gState='serverList';return;}
    return;
  }
  // ⑤ 결과 화면
  if(gState==='result'){
    if(inR(mx,my,{x:W/2-130,y:370,w:260,h:58})){serverMsg='';socket.emit('getRooms');gState='serverList';matchResult=null;return;}
    if(inR(mx,my,{x:W/2-130,y:445,w:260,h:48})){gState='menu';mpState='';matchResult=null;return;}
    return;
  }
  if(gState==='playing'&&!ovData){
    if(!shopOpen&&inR(mx,my,{x:10,y:H-50,w:110,h:38})){shopOpen=true;return;}
    if(shopOpen){
      if(sClose&&inR(mx,my,sClose)){shopOpen=false;return;}
      if(sUp&&inR(mx,my,sUp)){shopScroll=Math.max(0,shopScroll-1);return;}
      if(sDn&&inR(mx,my,sDn)){shopScroll=Math.min(MAX_SCROLL,shopScroll+1);return;}
      for(const{r,id}of sBuy)if(inR(mx,my,r)){const item=SHOP.find(i=>i.id===id),cur=upg[id]||0;if(cur<item.cost.length){const c=Math.max(1,Math.floor(item.cost[cur]*DS.costMult));if(totalScore>=c){totalScore-=c;upg[id]=cur+1;}}return;}
      for(const{r,id}of sSell)if(inR(mx,my,r)){const item=SHOP.find(i=>i.id===id),cur=upg[id]||0;if(cur>0){totalScore+=Math.floor(item.cost[cur-1]*.75*DS.costMult);upg[id]=cur-1;}return;}
    }
  }
});

canvas.addEventListener('wheel',e=>{
  if(helpOpen){helpScroll=Math.max(0,Math.min(HELP_MAX_SCR,helpScroll+(e.deltaY>0?1:-1)));e.preventDefault();return;}

// ===== 상대방 미니 화면 =====
function drawOpponentMini(){
  if(!opponentGameState) return;
  const sc=0.22, mw=Math.floor(800*sc), mh=Math.floor(600*sc);  // 176 x 132
  const mx=W-mw-8, my=H-mh-58;
  // 배경 + 테두리
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(mx-2,my-18,mw+4,mh+20);
  ctx.strokeStyle='#FF6666';ctx.lineWidth=2;ctx.strokeRect(mx-2,my-18,mw+4,mh+20);
  ctx.font='bold 11px Arial';ctx.fillStyle='#FF9999';ctx.textAlign='left';ctx.fillText('👤 상대방 화면',mx,my-5);
  // 클립 영역 설정
  ctx.save();
  ctx.beginPath();ctx.rect(mx,my,mw,mh);ctx.clip();
  ctx.translate(mx,my);ctx.scale(sc,sc);
  // 하늘색 배경
  ctx.fillStyle='#5599CC';ctx.fillRect(0,0,800,600);
  ctx.fillStyle='#44AA44';ctx.fillRect(0,500,800,100);
  // 풍선 그리기
  const s=opponentGameState;
  if(s.balloons)for(const b of s.balloons){ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle=b.color;ctx.fill();}
  // 보스 그리기
  if(s.boss){ctx.beginPath();ctx.arc(s.boss.x,s.boss.y,s.boss.r,0,Math.PI*2);ctx.fillStyle=s.boss.color||'#FF2222';ctx.fill();}
  // 화살 그리기
  if(s.arrows)for(const a of s.arrows){ctx.beginPath();ctx.arc(a.x,a.y,5,0,Math.PI*2);ctx.fillStyle='#FFD700';ctx.fill();}
  ctx.restore();
}

// ===== GAME LOOP =====
function gameLoop(ts){
  const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;
  updateClouds();

  if(gState==='menu'){drawMenu();requestAnimationFrame(gameLoop);return;}
  if(gState==='slotSelect'){drawSlotSelect();requestAnimationFrame(gameLoop);return;}
  if(gState==='diffSelect'){drawDiffSelect();requestAnimationFrame(gameLoop);return;}
  if(gState==='serverList'){drawServerList();requestAnimationFrame(gameLoop);return;}
  let _waitBackBtn=null;
  if(gState==='waiting'){_waitBackBtn=drawWaiting();requestAnimationFrame(gameLoop);return;}
  if(gState==='result'){drawResult();requestAnimationFrame(gameLoop);return;}

  // ---- UPDATE ----
  if(!shopOpen&&!ovData&&!helpOpen&&!paused){
    if(keysDown['ArrowLeft']) bow.rotate(-1);
    if(keysDown['ArrowRight']) bow.rotate(1);
    if(bow.charging) bow.ct=Math.min(bow.ct+dt,MAX_CHARGE);
    if(freezeTimer>0) freezeTimer=Math.max(0,freezeTimer-dt);
    else timeLeft-=dt;
    const cap=AC[upg.infinite||0];
    if(cap!==-1&&arrowsLeft<cap){refillTimer+=dt;if(refillTimer>=3){arrowsLeft++;refillTimer=0;}}
    if(!bossSpawned){
      if(level%100===50){boss=new Boss(world,false);bossSpawned=true;}
      else if(level%100===0){boss=new Boss(world,true);bossSpawned=true;}
    }
    if(boss)boss.update();
    spawnT++;if(spawnT>=(boss?90:60)){balloons.push(new Balloon(upg.lucky||0,getSpdMult(world)));spawnT=0;}
    const slow=SF[upg.slow||0];
    if(freezeTimer<=0) for(const b of balloons)b.update(slow);
    const allT=[...balloons,...(boss?[boss]:[])];
    for(const a of arrows)a.update(allT);
    const mag=MG[upg.magnet||0];
    if(mag>0)for(const b of balloons)for(const a of arrows){const d=Math.hypot(a.x-b.x,a.y-b.y);if(d>0&&d<160){b.x+=(a.x-b.x)/d*mag;b.y+=(a.y-b.y)/d*mag;}}
    for(const e of fx)e.update();for(const p of popups)p.update();for(const l of lightFX)l.update();
    // collisions
    for(let i=arrows.length-1;i>=0;i--){
      const ar=arrows[i];let hit=false;
      if(boss){const d=Math.hypot(ar.x-boss.x,ar.y-boss.y);if(d<boss.r){boss.hit();if(boss.dead()){const pts=boss.pts*DM[upg.doublepoints||0];score+=pts;totalScore+=pts;popups.push(new ScorePopup(boss.x,boss.y-50,pts,boss.color));fx.push(new ExpFX(boss.x,boss.y,120));playLevelClear();boss=null;bossSpawned=false;}arrows.splice(i,1);hit=true;}}
      if(!hit){
        for(let j=balloons.length-1;j>=0;j--){
          const bl=balloons[j];if(Math.hypot(ar.x-bl.x,ar.y-bl.y)<bl.r){
            const g=popBalloon(bl);score+=g;totalScore+=g;
            if(ar.expR>0){fx.push(new ExpFX(ar.x,ar.y,ar.expR));for(let k=balloons.length-1;k>=0;k--){const nb=balloons[k];if(Math.hypot(ar.x-nb.x,ar.y-nb.y)<ar.expR){const gg=popBalloon(nb);score+=gg;totalScore+=gg;}}}
            const nc=LC[upg.lightning||0];if(nc>0){const sorted=[...balloons].sort((a,b)=>Math.hypot(a.x-bl.x,a.y-bl.y)-Math.hypot(b.x-bl.x,b.y-bl.y)).slice(0,nc);for(const nb of sorted){lightFX.push(new LightFX(bl.x,bl.y,nb.x,nb.y));const gg=popBalloon(nb);score+=gg;totalScore+=gg;}}
            if((upg.freezer||0)>0&&freezeTimer<=0)freezeTimer=FT[upg.freezer];
            ar.hits++;if(!ar.canPierce())arrows.splice(i,1);break;
          }
        }
      }
    }
    for(const b of balloons){if(b.offScreen()){const dmg=b.pts;bowHp=Math.max(0,bowHp-dmg);popups.push(new ScorePopup(bow.x,H-100,-dmg,'#FF4444'));}}
    balloons=balloons.filter(b=>!b.offScreen());
    arrows=arrows.filter(a=>!a.offScreen());
    fx=fx.filter(e=>!e.done());popups=popups.filter(p=>!p.done());lightFX=lightFX.filter(l=>!l.done());
    mpSendScore();
    frameCount++;
    if(frameCount%4===0&&socket&&mpState==='playing'){socket.emit('stateUpdate',{balloons:balloons.map(b=>({x:b.x,y:b.y,r:b.r,color:b.color})),arrows:arrows.map(a=>({x:a.x,y:a.y,angle:a.angle})),boss:boss?{x:boss.x,y:boss.y,r:boss.r,color:boss.color}:null});}
    if(score>=targetScore&&!boss){saveHS(level,world,totalScore);if(level%100===0){showOv(`WORLD ${world} CLEAR! 🎉`,`Entering World ${world+1}...`,'#FFD700',3500,()=>{world++;level=1;totalScore=0;resetUpg();arrowsLeft=DS.arrows;refillTimer=0;startBGM(world-1);score=0;bossSpawned=false;bowHp=bowMaxHp;timeLeft=getTime(level);targetScore=getTarget(level,world);balloons=[];arrows=[];if(gameMode==='single')saveSlot();});}else{showOv(`LEVEL ${level} CLEAR!`,`→ Level ${level+1}`,'#32CD32',2000,()=>{level++;score=0;bossSpawned=false;bowHp=bowMaxHp;timeLeft=getTime(level);targetScore=getTarget(level,world);balloons=[];arrows=[];if(gameMode==='single')saveSlot();});}}
    if(bowHp<=0&&!ovData){saveHS(level,world,totalScore);if(gameMode==='single')deleteSlot(currentSlot);mpSendScore();mpGameOver();if(socket)socket.emit('saveScore',{playerName:'Player',score:totalScore,world,level,diff:Object.keys(DIFF).find(k=>DIFF[k]===DS)||'normal'});const hs=loadHS();showOv('💔 활이 부서졌어!',`World ${world}  Level ${level}  |  Best: W${hs.world} L${hs.level}`,'#FF4444',2500,()=>{if(mpState!=='playing'){gState='menu';stopBGM();startBGM(0);}});}
    if(timeLeft<=0&&bowHp>0){saveHS(level,world,totalScore);if(gameMode==='single')deleteSlot(currentSlot);mpSendScore();mpGameOver();if(socket)socket.emit('saveScore',{playerName:'Player',score:totalScore,world,level,diff:Object.keys(DIFF).find(k=>DIFF[k]===DS)||'normal'});const hs=loadHS();showOv('GAME OVER',`World ${world}  Level ${level}  |  Best: W${hs.world} L${hs.level}`,'#DC143C',2500,()=>{if(mpState!=='playing'){gState='menu';stopBGM();startBGM(0);}});}
  }
  if(ovData&&performance.now()>ovData.until){const cb=ovData.cb;ovData=null;if(cb)cb();}

  // ---- DRAW ----
  drawBG(world);
  for(const b of balloons)b.draw();
  if(boss)boss.draw();
  for(const a of arrows)a.draw();
  for(const e of fx)e.draw();
  for(const l of lightFX)l.draw();
  for(const p of popups)p.draw();
  bow.draw();
  // eagle eye
  if(bow.charging&&(upg.eagleeye||0)>0){
    let[px2,py2]=bow.tip();const rad=bow.angle*Math.PI/180;
    const pdx=Math.cos(rad)*12,pdy=Math.sin(rad)*12;
    const steps=EE[upg.eagleeye];
    for(let i=0;i<steps;i++){px2+=pdx;py2+=pdy;if(px2<0||px2>W||py2<0)break;ctx.beginPath();ctx.arc(px2,py2,3,0,Math.PI*2);ctx.fillStyle='rgba(150,150,255,0.6)';ctx.fill();}
  }
  // HUD bar
  ctx.fillStyle='rgba(0,0,0,0.47)';ctx.fillRect(0,0,W,50);
  ctx.font='bold 26px Arial';ctx.fillStyle='#FFF';ctx.textAlign='left';
  ctx.fillText(`Score: ${score} / ${targetScore}`,10,34);
  ctx.textAlign='center';ctx.fillStyle='#FFD700';
  ctx.fillText(`Lv ${level}  ${getTheme(world).name}`,W/2,34);
  ctx.textAlign='right';ctx.fillStyle=timeLeft<10?'#FF4444':'#FFF';
  ctx.fillText(`${Math.max(0,Math.ceil(timeLeft))}s`,W-80,34);
  // exit btn
  drawExitBtn();
  // sub-HUD
  ctx.font='16px Arial';ctx.fillStyle='#FFD700';ctx.textAlign='right';
  ctx.fillText(`Wallet: ${totalScore}pts`,W-10,62);
  const cap=AC[upg.infinite||0];
  ctx.fillStyle=(arrowsLeft>0||cap===-1)?'#FFF':'#FF4444';
  ctx.fillText(cap===-1?'Arrows: ∞':`Arrows: ${arrowsLeft}/${cap}`,W-10,80);
  const hs=loadHS();ctx.fillStyle='#FFD700';ctx.fillText(`Best: W${hs.world} L${hs.level}`,W-10,98);
  ctx.font='bold 14px Arial';ctx.fillStyle=DS.color;ctx.textAlign='left';ctx.fillText(DS.label,10,62);
  // 활 HP 바
  {const bww=120,bwh=10,bwx=10,bwy=68;const ratio=bowHp/bowMaxHp;const hpCol=ratio>0.5?'#44DD44':ratio>0.25?'#FFAA00':'#FF2222';ctx.fillStyle='#333';ctx.fillRect(bwx,bwy,bww,bwh);ctx.fillStyle=hpCol;ctx.fillRect(bwx,bwy,Math.floor(bww*ratio),bwh);ctx.strokeStyle='#888';ctx.lineWidth=1;ctx.strokeRect(bwx,bwy,bww,bwh);ctx.font='11px Arial';ctx.fillStyle='#FFF';ctx.textAlign='left';ctx.fillText(`🏹 ${bowHp}/${bowMaxHp}`,bwx,bwy-2);}
  // 멀티플레이 상대 점수
  if(mpState==='playing'){ctx.font='bold 16px Arial';ctx.fillStyle='#FF8888';ctx.textAlign='left';ctx.fillText(`👤 상대: ${opponentScore}pts`,10,92);}
  // charge bar
  if(bow.charging){const bw2=Math.floor(bow.ct/MAX_CHARGE*200);ctx.fillStyle='#32CD32';ctx.fillRect(300,H-25,bw2,15);ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.strokeRect(300,H-25,200,15);ctx.font='15px Arial';ctx.fillStyle='#333';ctx.textAlign='center';ctx.fillText('RELEASE!',400,H-48);}
  // freeze overlay
  if(freezeTimer>0){ctx.fillStyle='rgba(100,200,255,0.13)';ctx.fillRect(0,0,W,H);ctx.font='bold 30px Arial';ctx.fillStyle='#00DDFF';ctx.textAlign='center';ctx.fillText(`FROZEN! ${freezeTimer.toFixed(1)}s`,W/2,70);}
  // boss warning
  if(boss){ctx.font='bold 26px Arial';ctx.fillStyle='#FF4444';ctx.textAlign='center';ctx.fillText(`⚠ ${boss.name} ⚠`,W/2,H/2+180);}
  // shop btn
  rr(10,H-50,110,38,8,'#1E1E1E',null,0);ctx.font='bold 16px Arial';ctx.fillStyle='#FFD700';ctx.textAlign='center';ctx.fillText('SHOP',65,H-26);
  // ? help button (right of shop)
  ctx.beginPath();ctx.arc(130,H-31,15,0,Math.PI*2);ctx.fillStyle='#3C50B4';ctx.fill();
  ctx.strokeStyle='#8CA0FF';ctx.lineWidth=2;ctx.stroke();
  ctx.font='bold 16px Arial';ctx.fillStyle='#FFF';ctx.textAlign='center';ctx.fillText('?',130,H-25);
  // ⏸ 멈춤 버튼 (? 오른쪽)
  ctx.beginPath();ctx.arc(160,H-31,15,0,Math.PI*2);ctx.fillStyle=paused?'#884400':'#444';ctx.fill();
  ctx.strokeStyle=paused?'#FFA040':'#888';ctx.lineWidth=2;ctx.stroke();
  ctx.font='bold 15px Arial';ctx.fillStyle='#FFF';ctx.textAlign='center';ctx.fillText(paused?'▶':'⏸',160,H-25);
  // hint
  ctx.font='14px Arial';ctx.fillStyle='#888';ctx.textAlign='center';ctx.fillText('← → aim  |  SPACE to shoot',W/2,H-58);
  // overlay
  if(paused&&!optionsOpen){ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,W,H);ctx.font='bold 72px Arial';ctx.fillStyle='#FFA040';ctx.textAlign='center';ctx.fillText('⏸ 일시정지',W/2,240);ctx.font='26px Arial';ctx.fillStyle='#CCC';ctx.fillText('P 키 또는 버튼을 눌러서 계속해봐!',W/2,295);const ob={x:W/2-80,y:325,w:160,h:48};rr(ob.x,ob.y,ob.w,ob.h,12,'#333','#AAA',2);ctx.font='bold 22px Arial';ctx.fillStyle='#FFF';ctx.textAlign='center';ctx.fillText('⚙ OPTIONS',W/2,ob.y+ob.h/2+8);}
  if(optionsOpen)drawOptions();
  if(ovData){ctx.fillStyle='rgba(0,0,0,0.62)';ctx.fillRect(0,0,W,H);ctx.font='bold 70px Arial';ctx.fillStyle=ovData.color;ctx.textAlign='center';ctx.fillText(ovData.title,W/2,230);ctx.font='32px Arial';ctx.fillStyle='#FFF';ctx.fillText(ovData.sub,W/2,310);}
  if(mpState==='playing')drawOpponentMini();
  if(shopOpen)drawShop();
  if(helpOpen)drawHelp();
  requestAnimationFrame(gameLoop);
}

resetUpg();
requestAnimationFrame(ts=>{lastT=ts;gameLoop(ts);});
</script>
