<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d2b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a4a;stop-opacity:1" />
    </linearGradient>

    <!-- Balloon gradients -->
    <radialGradient id="redBall" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#ff8080" />
      <stop offset="100%" style="stop-color:#cc0000" />
    </radialGradient>
    <radialGradient id="blueBall" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#80b4ff" />
      <stop offset="100%" style="stop-color:#1a5acc" />
    </radialGradient>
    <radialGradient id="greenBall" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#80ff99" />
      <stop offset="100%" style="stop-color:#1aaa33" />
    </radialGradient>
    <radialGradient id="purpleBall" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#d080ff" />
      <stop offset="100%" style="stop-color:#7700cc" />
    </radialGradient>
    <radialGradient id="goldBall" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#ffe066" />
      <stop offset="100%" style="stop-color:#cc8800" />
    </radialGradient>

    <!-- Text gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff" />
      <stop offset="60%" style="stop-color:#ffd700" />
      <stop offset="100%" style="stop-color:#ff8c00" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="popGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="520" height="200" rx="18" ry="18" fill="url(#bgGrad)" />
  <rect width="520" height="200" rx="18" ry="18" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.5" />

  <!-- Stars in background -->
  <circle cx="30"  cy="20"  r="1.2" fill="white" opacity="0.6"/>
  <circle cx="80"  cy="10"  r="1"   fill="white" opacity="0.5"/>
  <circle cx="140" cy="30"  r="1.5" fill="white" opacity="0.4"/>
  <circle cx="370" cy="15"  r="1.2" fill="white" opacity="0.6"/>
  <circle cx="430" cy="25"  r="1"   fill="white" opacity="0.5"/>
  <circle cx="490" cy="12"  r="1.5" fill="white" opacity="0.4"/>
  <circle cx="500" cy="60"  r="1"   fill="white" opacity="0.3"/>
  <circle cx="20"  cy="80"  r="1.2" fill="white" opacity="0.4"/>
  <circle cx="505" cy="140" r="1"   fill="white" opacity="0.5"/>

  <!-- ===== BALLOONS (left cluster) ===== -->

  <!-- Purple balloon (back-left, slightly behind) -->
  <g transform="translate(38, 52)" opacity="0.9">
    <ellipse cx="0" cy="0" rx="22" ry="26" fill="url(#purpleBall)" filter="url(#glow)"/>
    <ellipse cx="-6" cy="-9" rx="6" ry="4" fill="white" opacity="0.25" transform="rotate(-20)"/>
    <path d="M0 26 Q3 32 0 38 Q-3 44 1 50" stroke="#7700cc" stroke-width="1.5" fill="none" opacity="0.8"/>
    <!-- knot -->
    <circle cx="0" cy="27" r="2.5" fill="#5500aa"/>
  </g>

  <!-- Red balloon (back-right) -->
  <g transform="translate(100, 45)" opacity="0.9">
    <ellipse cx="0" cy="0" rx="23" ry="27" fill="url(#redBall)" filter="url(#glow)"/>
    <ellipse cx="-7" cy="-10" rx="6" ry="4" fill="white" opacity="0.25" transform="rotate(-15)"/>
    <path d="M0 27 Q4 34 1 40 Q-2 46 2 52" stroke="#cc0000" stroke-width="1.5" fill="none" opacity="0.8"/>
    <circle cx="0" cy="28" r="2.5" fill="#aa0000"/>
  </g>

  <!-- Blue balloon (front-left) -->
  <g transform="translate(58, 28)" filter="url(#glow)">
    <ellipse cx="0" cy="0" rx="25" ry="30" fill="url(#blueBall)"/>
    <ellipse cx="-8" cy="-11" rx="7" ry="5" fill="white" opacity="0.3" transform="rotate(-20)"/>
    <path d="M0 30 Q5 38 2 46 Q-1 52 3 58" stroke="#1a5acc" stroke-width="1.5" fill="none" opacity="0.8"/>
    <circle cx="0" cy="31" r="3" fill="#1144aa"/>
  </g>

  <!-- Green balloon (front-center) -->
  <g transform="translate(90, 18)" filter="url(#glow)">
    <ellipse cx="0" cy="0" rx="26" ry="31" fill="url(#greenBall)"/>
    <ellipse cx="-8" cy="-12" rx="7" ry="5" fill="white" opacity="0.3" transform="rotate(-15)"/>
    <path d="M0 31 Q6 39 3 47 Q0 55 4 61" stroke="#1aaa33" stroke-width="1.5" fill="none" opacity="0.8"/>
    <circle cx="0" cy="32" r="3" fill="#118822"/>
  </g>

  <!-- Gold balloon (front-right, biggest) -->
  <g transform="translate(128, 32)" filter="url(#glow)">
    <ellipse cx="0" cy="0" rx="24" ry="28" fill="url(#goldBall)"/>
    <ellipse cx="-7" cy="-10" rx="7" ry="5" fill="white" opacity="0.35" transform="rotate(-15)"/>
    <path d="M0 28 Q5 36 2 44 Q-1 50 3 56" stroke="#cc8800" stroke-width="1.5" fill="none" opacity="0.8"/>
    <circle cx="0" cy="29" r="2.8" fill="#aa7700"/>
  </g>

  <!-- ===== ARROW piercing through green balloon ===== -->
  <!-- Arrow shaft -->
  <line x1="50" y1="95" x2="195" y2="10" stroke="#c8a060" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Arrow head -->
  <polygon points="195,10 183,16 188,4" fill="#e8c070" filter="url(#glow)"/>
  <!-- Arrow tail fletching -->
  <polygon points="50,95 44,85 56,87" fill="#e05050" opacity="0.9"/>
  <polygon points="50,95 42,92 52,100" fill="#5080e0" opacity="0.9"/>

  <!-- Pop burst on green balloon -->
  <g transform="translate(90,18)" filter="url(#popGlow)" opacity="0.85">
    <line x1="0"  y1="-35" x2="0"  y2="-44" stroke="#80ff99" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="24" y1="-26" x2="30" y2="-33" stroke="#ffd700" stroke-width="2"   stroke-linecap="round"/>
    <line x1="32" y1="0"   x2="41" y2="0"   stroke="#80ff99" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="24" y1="26"  x2="30" y2="33"  stroke="#ffd700" stroke-width="2"   stroke-linecap="round"/>
    <line x1="-24" y1="-26" x2="-30" y2="-33" stroke="#80ff99" stroke-width="2" stroke-linecap="round"/>
    <line x1="-32" y1="0"   x2="-41" y2="0"   stroke="#ffd700" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- ===== TITLE TEXT ===== -->
  <!-- Shadow layer -->
  <text x="216" y="98"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="58"
        fill="#000000"
        opacity="0.5"
        letter-spacing="1">BALLOON</text>
  <text x="218" y="158"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="58"
        fill="#000000"
        opacity="0.5"
        letter-spacing="1">BLAST</text>

  <!-- Main text -->
  <text x="214" y="96"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="58"
        fill="url(#titleGrad)"
        filter="url(#textGlow)"
        letter-spacing="1">BALLOON</text>
  <text x="214" y="156"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="58"
        fill="url(#titleGrad)"
        filter="url(#textGlow)"
        letter-spacing="1">BLAST</text>

  <!-- Decorative line under title -->
  <line x1="214" y1="165" x2="500" y2="165" stroke="#ffd700" stroke-width="2" opacity="0.5" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="214" y="183"
        font-family="Arial, sans-serif"
        font-size="13"
        fill="#aaaadd"
        letter-spacing="3">POP  ·  SCORE  ·  UPGRADE</text>

  <!-- Small bow icon next to tagline -->
  <g transform="translate(498, 175)">
    <path d="M0,-10 Q8,0 0,10" stroke="#ffd700" stroke-width="2" fill="none" stroke-linecap="round"/>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#c8a060" stroke-width="1.5"/>
    <line x1="-5" y1="0" x2="6" y2="0" stroke="#e8c070" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="6,0 2,-2 2,2" fill="#e8c070"/>
  </g>

</svg>
